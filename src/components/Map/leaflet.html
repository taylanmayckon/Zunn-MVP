<!DOCTYPE html>

<html>

<head>

<meta 
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>


<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>


<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>


<style>

html,
body,
#map {

height:100%;
width:100%;
margin:0;
padding:0;

}


</style>


</head>


<body>


<div id="map"></div>


<script>


const map = L.map("map")
.setView(
[
-9.4121,
-40.4984
],
15
);



L.tileLayer(
"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
{

attribution:
"OpenStreetMap"

}

)
.addTo(map);



function createIcon(selected, battery){


return L.divIcon({

className:"custom-marker",


html:

'<div style="' +

'display:flex;' +
'flex-direction:column;' +
'align-items:center;' +

'transform:scale(' +
(selected ? 1.25 : 1) +
');' +

'transition:transform 0.2s;' +

'">' +



// bateria

'<div style="' +

'background:' +
(selected ? "#ffffff" : "#27272a") +
';' +

'color:' +
(selected ? "#09090b" : "#A3E635") +
';' +

'padding:3px 8px;' +

'border-radius:12px;' +

'font-size:11px;' +

'font-weight:bold;' +

'margin-bottom:4px;' +

'border:1px solid rgba(163,230,53,0.4);' +

'box-shadow:0 4px 8px rgba(0,0,0,0.3);' +

'">' +

battery +
'%' +

'</div>' +




// círculo

'<div style="' +

'width:38px;' +
'height:38px;' +

'border-radius:50%;' +

'background:' +
(selected ? "#A3E635" : "#18181b") +
';' +

'border:2px solid ' +
(selected ? "#ffffff" : "#A3E635") +
';' +

'display:flex;' +
'align-items:center;' +
'justify-content:center;' +

'box-shadow:0 0 12px rgba(163,230,53,0.5);' +

'">' +


'<span style="' +

'color:' +
(selected ? "#09090b" : "#A3E635") +
';' +

'font-size:18px;' +

'">⚡</span>' +


'</div>' +


'</div>',



iconSize:[
50,
70
],


iconAnchor:[
25,
70
]


});


}



function renderStations(){

    if(!window.stations)
        return;

    window.stations.forEach((station)=>{

        L.circle(

            [
                station.latitude,
                station.longitude
            ],

            {

                radius:35,

                color:"#A3E635",

                fillColor:"#65A30D",

                fillOpacity:0.30,

                weight:2

            }

        ).addTo(map);



        const icon = L.divIcon({

            className:"station",

            html:

            '<div style="display:flex;flex-direction:column;align-items:center;">'

            +

            '<div style="background:#A3E635;color:#09090b;border-radius:999px;padding:4px 10px;font-weight:bold;">'

            +

            "🛴 " + station.availableScooters

            +

            '</div>'

            +

            '<div style="margin-top:4px;color:white;font-size:11px;text-shadow:0 0 4px black;">'

            +

            station.name

            +

            '</div>'

            +

            '</div>',

            iconSize:[90,50]

        });



        L.marker(

            [

                station.latitude,

                station.longitude

            ],

            {

                icon

            }

        ).addTo(map);

    });

}



function renderScooters(){


if(!window.scooters)
return;



window.scooters.forEach(
(scooter)=>{


const selected =
window.selectedScooter === scooter.id;



const marker =
L.marker(

[
scooter.latitude,
scooter.longitude
],

{
icon:createIcon(selected, scooter.battery)
}

)
.addTo(map);



marker.on(
"click",
()=>{


window.ReactNativeWebView
.postMessage(

JSON.stringify(scooter)

);


});



});


}



</script>


</body>


</html>
