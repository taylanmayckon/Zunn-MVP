<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: #09090b;
        }

        .leaflet-control-attribution {
            display: none;
        }

        .marker-pop {
            animation: popIn 250ms ease-out forwards;
        }

        @keyframes popIn {
            from {
                transform: scale(0.2);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Animação de respiração suave para o círculo de raio da estação */
        .circle-active-pulse {
            animation: circleBreathe 2.5s infinite ease-in-out;
        }

        @keyframes circleBreathe {
            0% {
                fill-opacity: 0.08;
                stroke-opacity: 0.3;
            }
            50% {
                fill-opacity: 0.18;
                stroke-opacity: 0.7;
            }
            100% {
                fill-opacity: 0.08;
                stroke-opacity: 0.3;
            }
        }

        /* Rótulo das estações */
        .station-label {
            margin-top: 6px;
            color: white;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            max-width: 120px;
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
        }

        .hide-labels .station-label {
            opacity: 0;
            transform: translateY(-4px);
            pointer-events: none;
        }

        /* --- ESTILIZAÇÃO DINÂMICA DOS PATINETES (ZOOM-RESPONSIVE) --- */
        
        .scooter-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: bottom center;
        }

        .scooter-battery {
            background: #27272a;
            color: #A3E635;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
            border: 1px solid rgba(163,230,53,0.4);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            white-space: nowrap;
            transition: opacity 0.2s ease, transform 0.2s ease;
            opacity: 1;
        }

        .scooter-icon-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #18181b;
            border: 2px solid #A3E635;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 12px rgba(163,230,53,0.4);
            transition: all 0.2s ease;
        }

        .scooter-icon-circle span {
            color: #A3E635;
            font-size: 18px;
            transition: color 0.2s;
        }

        /* Comportamento quando o patinete está SELECIONADO */
        .scooter-container.selected {
            transform: scale(1.25) !important; /* Mantém o destaque independente do zoom de fundo */
            z-index: 9999;
        }
        .scooter-container.selected .scooter-battery {
            background: #ffffff;
            color: #09090b;
            opacity: 1 !important;
            transform: scale(1) !important;
        }
        .scooter-container.selected .scooter-icon-circle {
            background: #A3E635;
            border-color: #ffffff;
            box-shadow: 0 0 16px rgba(163,230,53,0.7);
        }
        .scooter-container.selected .scooter-icon-circle span {
            color: #09090b;
        }

        /* REGRAS DE ADAPTAÇÃO POR ZOOM */

        /* Zoom 14: Afastando um pouco (Esconde a bateria para limpar cruzamentos) */
        .zoom-low .scooter-container:not(.selected) {
            transform: scale(0.85);
        }
        .zoom-low .scooter-battery {
            opacity: 0;
            transform: scale(0.7) translateY(4px);
            pointer-events: none;
        }

        /* Zoom <= 13: Muito afastado (Vira um ponto indicador limpo e minimalista) */
        .zoom-far .scooter-container:not(.selected) {
            transform: scale(0.6);
        }
        .zoom-far .scooter-battery {
            opacity: 0;
            transform: scale(0.5) translateY(6px);
            pointer-events: none;
        }
        .zoom-far .scooter-icon-circle {
            box-shadow: 0 0 6px rgba(163,230,53,0.2);
        }

        /* Zoom >= 17: Muito próximo (Aumenta sutilmente para facilitar o toque na tela) */
        .zoom-high .scooter-container:not(.selected) {
            transform: scale(1.1);
        }

    </style>
</head>

<body>

<div id="map"></div>

<script>

const map = L.map("map", {
    zoomControl: false
}).setView([-9.4121, -40.4984], 15);


L.tileLayer(
    "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    {
        attribution: "OpenStreetMap"
    }
).addTo(map);


// Listener central de Zoom do Mapa
function updateZoomClasses() {
    const mapDiv = document.getElementById("map");
    const zoom = map.getZoom();
    
    // Reseta estados anteriores
    mapDiv.classList.remove("hide-labels", "zoom-far", "zoom-low", "zoom-med", "zoom-high");
    
    // Controle de textos das estações
    if (zoom < 15) {
        mapDiv.classList.add("hide-labels");
    }
    
    // Controle de escala dos patinetes
    if (zoom <= 13) {
        mapDiv.classList.add("zoom-far");
    } else if (zoom === 14) {
        mapDiv.classList.add("zoom-low");
    } else if (zoom >= 17) {
        mapDiv.classList.add("zoom-high");
    } else {
        mapDiv.classList.add("zoom-med"); // Padrão estável para níveis 15 e 16
    }
}

map.on("zoomend", updateZoomClasses);


const stationMarkers = [];
const stationCircles = [];
const movingScooterMarkers = [];
const stationScooterMarkers = [];

let expandedStation = null;


function clearMarkers(list) {
    list.forEach(marker => {
        map.removeLayer(marker);
    });
    list.length = 0;
}


function createScooterIcon(selected, battery) {
    return L.divIcon({
        className: "custom-marker",
        html: `
        <div class="scooter-container ${selected ? 'selected' : ''}">
            <div class="scooter-battery">🔋 ${battery}%</div>
            <div class="scooter-icon-circle">
                <span>⚡</span>
            </div>
        </div>
        `,
        iconSize:[50, 70],
        iconAnchor:[25, 70]
    });
}


function sendScooterMessage(scooter){
    if(window.ReactNativeWebView){
        window.ReactNativeWebView.postMessage(
            JSON.stringify({
                type:"scooter",
                scooter
            })
        );
    }
}


function createScooterMarker(scooter){
    const marker = L.marker(
        [
            scooter.latitude,
            scooter.longitude
        ],
        {
            icon:createScooterIcon(
                window.selectedScooter === scooter.id,
                scooter.battery
            )
        }
    );

    marker.on("click",()=>{
        sendScooterMessage(scooter);
    });

    return marker;
}


function createExpandedScooterMarker(scooter){
    return createScooterMarker(scooter);
}


function createStationIcon(station, isExpanded){
    return L.divIcon({
        className:"",
        html:`
        <div style="display:flex;flex-direction:column;align-items:center;">
            <div style="background:${isExpanded ? '#84CC16' : '#A3E635'}; color:#09090b; height:34px; padding:0 14px; border-radius:17px; display:flex; align-items:center; justify-content:center; gap:6px; font-weight:800; font-size:15px; box-shadow:0 4px 10px rgba(0,0,0,.4); border: 2px solid ${isExpanded ? '#ffffff' : 'transparent'}; transition: all 0.3s ease;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                    <path d="M11.236 1.077c-.503-.311-1.139-.234-1.564.19A1.5 1.5 0 0 0 9.155 2.1l-4.5 12a1.5 1.5 0 0 0 1.93 1.93l3.415-1.28v8.25a1.5 1.5 0 0 0 2.825.707l6-13.5a1.5 1.5 0 0 0-1.785-2.073l-3.805 1.087V2.5a1.5 1.5 0 0 0-1.999-1.423z"/>
                </svg>
                ${station.availableScooters}
            </div>
            <div class="station-label">
                ${station.name}
            </div>
        </div>
        `,
        iconSize:[120,70],
        iconAnchor:[60,35]
    });
}


function renderStations(){
    clearMarkers(stationMarkers);

    stationCircles.forEach(circle=>{
        map.removeLayer(circle);
    });
    stationCircles.length=0;

    if(!window.stations)
        return;

    window.stations.forEach(station=>{
        const isCurrentExpanded = expandedStation === station.id;

        const circle=L.circle(
            [
                station.latitude,
                station.longitude
            ],
            {
                radius:45,
                color:"#A3E635",
                fillColor:"#65A30D",
                fillOpacity: isCurrentExpanded ? 0.12 : 0.25,
                weight: isCurrentExpanded ? 1.5 : 2
            }
        );

        circle.addTo(map);
        stationCircles.push(circle);
        station.circleRef = circle;

        if (isCurrentExpanded && circle._path) {
            circle._path.classList.add("circle-active-pulse");
        }

        const marker=L.marker(
            [
                station.latitude,
                station.longitude
            ],
            {
                icon:createStationIcon(station, isCurrentExpanded)
            }
        );

        marker.addTo(map);

        marker.on("click",()=>{
            if(expandedStation===station.id){
                collapseStations();
            }
            else{
                expandStation(station);
            }
        });

        stationMarkers.push(marker);
        station.markerRef = marker;
    });
}


function renderMovingScooters(){
    clearMarkers(movingScooterMarkers);

    if(!window.scooters)
        return;

    window.scooters.forEach(scooter=>{
        const marker=createScooterMarker(scooter);
        marker.addTo(map);
        movingScooterMarkers.push(marker);
    });
}


function expandStation(station){
    collapseStations();

    expandedStation=station.id;

    if (station.markerRef) {
        station.markerRef.setIcon(createStationIcon(station, true));
    }

    if (station.circleRef) {
        station.circleRef.setStyle({
            fillOpacity: 0.12,
            weight: 1.5
        });
        if (station.circleRef._path) {
            station.circleRef._path.classList.add("circle-active-pulse");
        }
    }

    const stationScooters=(window.allScooters || [])
        .filter(
            scooter=>scooter.stationId===station.id
        );

    stationScooters.forEach((scooter,index)=>{
        const angle=(index/stationScooters.length)*Math.PI*2;
        const radius=0.00030;

        const expandedScooter={
            ...scooter,
            latitude:
                station.latitude+
                Math.cos(angle)*radius,
            longitude:
                station.longitude+
                Math.sin(angle)*radius
        };

        const marker=createExpandedScooterMarker(expandedScooter);
        marker.addTo(map);
        stationScooterMarkers.push(marker);
    });
}


function collapseStations(){
    if (expandedStation && window.stations) {
        const prevStation = window.stations.find(item => item.id === expandedStation);
        if (prevStation) {
            if (prevStation.markerRef) {
                prevStation.markerRef.setIcon(createStationIcon(prevStation, false));
            }
            if (prevStation.circleRef) {
                prevStation.circleRef.setStyle({
                    color: "#A3E635",
                    fillColor: "#65A30D",
                    fillOpacity: 0.25,
                    weight: 2
                });
                if (prevStation.circleRef._path) {
                    prevStation.circleRef._path.classList.remove("circle-active-pulse");
                }
            }
        }
    }

    clearMarkers(stationScooterMarkers);
    expandedStation=null;
}


function initializeMapData(){
    // Garante que o estado correto de zoom seja aplicado imediatamente na montagem
    updateZoomClasses();
    
    if(window.stations && window.allScooters){
        renderStations();
        renderMovingScooters();
    }
}

window.initializeMapData = initializeMapData;


map.on("click",()=>{
    collapseStations();
});


window.updateSelectedScooter=function(id){
    window.selectedScooter=id;

    clearMarkers(movingScooterMarkers);
    clearMarkers(stationScooterMarkers);

    renderMovingScooters();

    if(expandedStation){
        const station=
            window.stations.find(
                item=>item.id===expandedStation
            );

        if(station){
            expandStation(station);
        }
    }
};

</script>

</body>
</html>
