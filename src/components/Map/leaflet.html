<!DOCTYPE html>

<html>

<head>

<meta 
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>


<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>


<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>


<style>

html,
body,
#map {

height:100%;
width:100%;
margin:0;
padding:0;

}


</style>


</head>


<body>


<div id="map"></div>


<script>


const map = L.map("map")
.setView(
[
-9.4121,
-40.4984
],
15
);



L.tileLayer(
"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
{

attribution:
"OpenStreetMap"

}

)
.addTo(map);



function createIcon(selected){


return L.divIcon({

className:"",


html:

'<div style="' +

'width:36px;' +
'height:36px;' +
'border-radius:50%;' +

'background:' +
(selected ? "#A3E635" : "#18181b") +
';' +

'border:2px solid white;' +

'display:flex;' +
'align-items:center;' +
'justify-content:center;' +

'font-size:18px;' +

'transform:scale(' +
(selected ? 1.3 : 1) +
');' +

'">' +

'⚡' +

'</div>'

});


}




function renderScooters(){


if(!window.scooters)
return;



window.scooters.forEach(
(scooter)=>{


const selected =
window.selectedScooter === scooter.id;



const marker =
L.marker(

[
scooter.latitude,
scooter.longitude
],

{
icon:createIcon(selected)
}

)
.addTo(map);



marker.on(
"click",
()=>{


window.ReactNativeWebView
.postMessage(

JSON.stringify(scooter)

);


});



});


}



</script>


</body>


</html>
